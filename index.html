<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Bibi, a biblioteca</title>
  </head>
  <body>
    <main class="area-login">
      <figure class="area-login-logo">
        <img src="img/logo.png" alt="logo" />
        <figcaption><h1>Bibi</h1></figcaption>
      </figure>
      <form class="area-login-form">
        <input type="text" required placeholder="Usuário" name="user" />
        <input type="password" required placeholder="Senha" name="password" minlength="8"/>
        <button type="submit">Logar</button>
        <a href="">esqueci minha senha</a>
      </form>
    </main>
  </body>
</html>
