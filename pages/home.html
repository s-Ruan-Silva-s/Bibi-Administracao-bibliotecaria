<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
    <title>Bibi home</title>
</head>
<body>
    <header class="home-area-header">
        <div class="home-area-user">
            <figure>
                <img src="../img/ru.jpeg" alt="foto de Usuário">
                <figcaption>nome Usuário</figcaption>
            </figure>
        </div>
    </header>
    <main class="home-area-main">
        <section class="home-area-main-sec-card" data-panel="livros">
            <h1>LIVROS</h1>
            <div class="home-dados">9455</div>
        </section>
        <section class="home-area-main-sec-card" data-panel="users">
            <h1>USUÁRIOS</h1>
            <div class="home-dados">10</div>
        </section>
        <section class="home-area-main-sec-card" data-panel="emprestimos">
            <h1>EMPRÉSTIMOS</h1>
            <div class="home-dados">100</div>
        </section>
        <section class="home-area-main-sec-card" data-panel="atrasos"> 
            <h1>ATRASOS</h1>
            <div class="home-dados">20</div>
        </section>
        <section class="home-area-main-panel ativo" id="livros">
            abc
        </section>
        <section class="home-area-main-panel" id="users">
            def
        </section>
        <section class="home-area-main-panel" id="emprestimos">
            ghi
        </section>
        <section class="home-area-main-panel" id="atrasos">
            jkl
        </section>
    </main>
    <script src="../js/spa.js"></script>
</body>
</html>
